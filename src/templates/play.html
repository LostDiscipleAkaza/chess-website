{% extends 'base.html' %}
{% block title %}Play — My Chess{% endblock %}

{% block head %}
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css" />
<style>
  .play-page {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    max-width: 600px;
    margin: 0 auto;
    padding: 0.5rem 0.75rem 2rem;
  }
  .board-wrapper {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
  }
  #board { width: 100% !important; }
  .board-status {
    color: var(--muted);
    font-size: .9rem;
    text-align: center;
    min-height: 1.4em;
  }
  .bot-info-bar {
    width: 100%;
    max-width: 560px;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.65rem 1rem;
  }
  .bot-initial-sm {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-head);
    font-size: 1rem;
    color: var(--accent);
    font-weight: 700;
    flex-shrink: 0;
  }
  .bot-name { font-family: var(--font-head); font-size: 1rem; flex: 1; }
  .chat-strip {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    max-height: 110px;
    overflow-y: auto;
  }
  .chat-msg {
    font-size: .85rem;
    color: var(--text);
    background: var(--surface2);
    border-radius: 8px;
    padding: .45rem .75rem;
    line-height: 1.4;
    animation: fadeIn .3s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(3px); } to { opacity:1; transform:none; } }
  .move-history {
    width: 100%;
    max-width: 560px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 1rem;
  }
  .move-history h3 {
    font-size: .75rem;
    text-transform: uppercase;
    color: var(--muted);
    letter-spacing: .06em;
    margin-bottom: .5rem;
  }
  #move-list {
    list-style: decimal;
    padding-left: 1.2rem;
    font-size: .9rem;
    max-height: 110px;
    overflow-y: auto;
    columns: 2;
    gap: 1rem;
  }
  #move-list li { padding: .1rem 0; break-inside: avoid; }
  #move-list li.active { color: var(--accent); }
  .game-controls {
    width: 100%;
    max-width: 560px;
    display: flex;
    gap: 0.75rem;
  }
  .game-controls button { flex: 1; }

  /* ── Highlights ── */
  .square-55d63 { position: relative; }
  .highlight-selected { background: rgba(201,168,76,.65) !important; }
  .highlight-move     { background: rgba(201,168,76,.30) !important; }
  .dot-hint {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 30%; height: 30%;
    background: rgba(201,168,76,.80);
    border-radius: 50%;
    pointer-events: none;
    z-index: 5;
  }

  /* ── Promotion modal ── */
  .promo-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.75);
    display: flex; align-items: center; justify-content: center;
    z-index: 2000;
  }
  .promo-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.5rem 2rem;
    text-align: center;
  }
  .promo-box h3 {
    font-family: var(--font-head);
    font-size: 1.1rem;
    color: var(--accent);
    margin-bottom: 1rem;
  }
  .promo-pieces { display: flex; gap: 0.75rem; justify-content: center; }
  .promo-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .promo-piece {
    width: 60px; height: 60px;
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color .15s, background .15s;
    padding: 4px;
  }
  .promo-piece:hover { border-color: var(--accent); background: var(--surface); }
  .promo-piece img { width: 100%; height: 100%; object-fit: contain; }
  .promo-label { font-size: .7rem; color: var(--muted); }

  /* ── Desktop grid ── */
  @media (min-width: 900px) {
    .play-page {
      display: grid;
      grid-template-columns: 200px 1fr 200px;
      max-width: 1060px;
      align-items: start;
      gap: 1.5rem;
      padding: 1rem 2rem 2rem;
    }
    .board-wrapper  { grid-column: 2; grid-row: 1 / 10; max-width: 560px; }
    .bot-info-bar   { grid-column: 1; grid-row: 1; max-width: none; }
    .chat-strip     { grid-column: 1; grid-row: 2; max-height: 260px; max-width: none; }
    .move-history   { grid-column: 3; grid-row: 1; max-width: none; }
    #move-list      { max-height: 340px; columns: 1; }
    .game-controls  { grid-column: 3; grid-row: 2; max-width: none; flex-direction: column; }
  }
</style>
{% endblock %}

{% block content %}
<div class="play-page">

  <div class="bot-info-bar" id="bot-info-bar"
       style="{{ 'display:none' if mode == 'pass_and_play' }}">
    <div class="bot-initial-sm" id="bot-avatar">?</div>
    <div class="bot-name" id="bot-name">{{ bot or 'Bot' }}</div>
  </div>

  <div class="chat-strip" id="chat-strip"
       style="{{ 'display:none' if mode == 'pass_and_play' }}"></div>

  <div class="board-wrapper">
    <div id="board"></div>
    <div class="board-status" id="board-status">Waiting...</div>
  </div>

  <div class="move-history">
    <h3>Moves</h3>
    <ol id="move-list"></ol>
  </div>

  <div class="game-controls">
    <button id="btn-resign" class="btn-outline btn-danger">Resign</button>
    <button id="btn-new"    class="btn-outline">New Game</button>
  </div>

</div>

<!-- Game-over modal -->
<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal-box">
    <h2 id="modal-title">Game Over</h2>
    <p  id="modal-body"></p>
    <div class="modal-actions">
      <button id="modal-save" class="btn-primary">Save Game</button>
      <a href="{{ url_for('game.dashboard') }}" class="btn-outline">Dashboard</a>
    </div>
  </div>
</div>

<!-- Promotion picker -->
<div class="promo-overlay" id="promo-modal" style="display:none">
  <div class="promo-box">
    <h3>Promote Pawn</h3>
    <div class="promo-pieces" id="promo-pieces"></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
<script>
  const MODE     = "{{ mode }}";
  const BOT_ID   = "{{ bot or '' }}";
  const MY_COLOR = "{{ color }}";

  const chess    = new Chess();
  const moveList = document.getElementById('move-list');

  // pass-and-play turn tracker
  var ppTurn = 'white';

  // guards
  var selectedSquare = null;
  var dragInProgress = false;
  var botThinking    = false;
  var prevFen        = null;

  // ── Piece images (Wikimedia SVGs) ────────────────────────────
  var WIKI = {
    wK:'4/42/Chess_klt45.svg', wQ:'1/15/Chess_qlt45.svg',
    wR:'7/72/Chess_rlt45.svg', wB:'b/b1/Chess_blt45.svg',
    wN:'7/70/Chess_nlt45.svg', wP:'4/45/Chess_plt45.svg',
    bK:'f/f0/Chess_kdt45.svg', bQ:'4/47/Chess_qdt45.svg',
    bR:'f/ff/Chess_rdt45.svg', bB:'9/98/Chess_bdt45.svg',
    bN:'e/ef/Chess_ndt45.svg', bP:'c/c7/Chess_pdt45.svg',
  };
  function pieceTheme(p) {
    return 'https://upload.wikimedia.org/wikipedia/commons/' + WIKI[p];
  }

  // ── Who is allowed to move right now ─────────────────────────
  // Returns 'w' or 'b'
  function activeColor() {
    if (MODE === 'bot') return MY_COLOR[0];
    return ppTurn[0];
  }

  function canMove() {
    if (chess.game_over()) return false;
    if (botThinking)       return false;
    return chess.turn() === activeColor();
  }

  // ── Highlights ───────────────────────────────────────────────
  function clearHighlights() {
    $('#board .square-55d63').removeClass('highlight-selected highlight-move');
    $('#board .dot-hint').remove();
    selectedSquare = null;
  }

  function selectSquare(sq) {
    clearHighlights();
    var legalTargets = chess.moves({ square: sq, verbose: true });
    if (!legalTargets.length) return;
    selectedSquare = sq;
    $('#board .square-' + sq).addClass('highlight-selected');
    legalTargets.forEach(function(m) {
      $('#board .square-' + m.to)
        .addClass('highlight-move')
        .append('<div class="dot-hint"></div>');
    });
  }

  // ── Promotion picker ─────────────────────────────────────────
  function isPromoMove(from, to) {
    var p = chess.get(from);
    if (!p || p.type !== 'p') return false;
    return (p.color === 'w' && to[1] === '8') ||
           (p.color === 'b' && to[1] === '1');
  }

  function pickPromotion(color) {
    return new Promise(function(resolve) {
      var defs = [
        { code:'q', label:'Queen'  },
        { code:'r', label:'Rook'   },
        { code:'b', label:'Bishop' },
        { code:'n', label:'Knight' },
      ];
      var c = (color === 'w') ? 'w' : 'b';
      var container = document.getElementById('promo-pieces');
      container.innerHTML = defs.map(function(d) {
        var key = c + d.code.toUpperCase();
        return '<div class="promo-item">' +
                 '<div class="promo-piece" data-code="' + d.code + '">' +
                   '<img src="' + pieceTheme(key) + '" alt="' + d.label + '">' +
                 '</div>' +
                 '<span class="promo-label">' + d.label + '</span>' +
               '</div>';
      }).join('');
      document.getElementById('promo-modal').style.display = 'flex';
      container.querySelectorAll('.promo-piece').forEach(function(el) {
        el.addEventListener('click', function() {
          document.getElementById('promo-modal').style.display = 'none';
          resolve(el.getAttribute('data-code'));
        }, { once: true });
      });
    });
  }

  // ── Core move executor ───────────────────────────────────────
  // from, to: square strings.  promo: 'q'|'r'|'b'|'n'|undefined
  // If promo is undefined and it's a promotion move, shows picker first.
  // Returns true if the move was accepted (or pending picker), false if illegal.
  function doMove(from, to, promo) {
    // Promotion pending
    if (promo === undefined && isPromoMove(from, to)) {
      var movingColor = chess.get(from).color;
      pickPromotion(movingColor).then(function(chosen) {
        doMove(from, to, chosen);
      });
      return true;  // pending
    }

    prevFen = chess.fen();
    var move = chess.move({ from: from, to: to, promotion: promo || 'q' });
    if (!move) return false;

    board.position(chess.fen());
    appendMove(move.san);
    checkGameOver();

    if (!chess.game_over()) {
      if (MODE === 'bot') {
        botThinking = true;
        setStatus('Bot is thinking...');
        setTimeout(function() { fetchBotMove(chess.fen()); }, 300);
      } else {
        // pass-and-play: flip
        ppTurn = (ppTurn === 'white') ? 'black' : 'white';
        setStatus(ppTurn.charAt(0).toUpperCase() + ppTurn.slice(1) + "'s turn");
      }
    }
    return true;
  }

  // ── chessboard.js drag callbacks ─────────────────────────────
  function onDragStart(source, piece) {
    if (!canMove())               return false;
    if (piece[0] !== activeColor()) return false;
    clearHighlights();
    dragInProgress = true;
    return true;
  }

  function onDrop(source, target) {
    if (source === target) {
      dragInProgress = false;
      return 'snapback';
    }

    // Promotion via drag: snap back visually, show picker, then apply
    if (isPromoMove(source, target)) {
      var movingColor = chess.get(source).color;
      pickPromotion(movingColor).then(function(chosen) {
        var ok = doMove(source, target, chosen);
        if (!ok) board.position(chess.fen());
      });
      dragInProgress = false;
      return 'snapback';
    }

    var ok = doMove(source, target, undefined);
    if (!ok) {
      dragInProgress = false;
      return 'snapback';
    }
    // dragInProgress cleared in onSnapEnd
  }

  function onSnapEnd() {
    board.position(chess.fen());
    setTimeout(function() { dragInProgress = false; }, 50);
  }

  // ── chessboard.js click callback ─────────────────────────────
  function onSquareClick(square) {
    if (dragInProgress) return;   // end of a drag, ignore
    if (!canMove())     return;

    var clickedPiece = chess.get(square);

    // ── Case 1: a piece is already selected ──
    if (selectedSquare !== null) {

      // Clicked the same square → deselect
      if (square === selectedSquare) {
        clearHighlights();
        return;
      }

      // Clicked another own piece → re-select it
      if (clickedPiece && clickedPiece.color === activeColor()) {
        selectSquare(square);
        return;
      }

      // Otherwise try to move there
      var legalNow = chess.moves({ square: selectedSquare, verbose: true });
      var legal    = legalNow.some(function(m) { return m.to === square; });

      var from = selectedSquare;
      clearHighlights();   // clear before doMove so state is clean

      if (legal) {
        doMove(from, square);   // promotion picker handled inside doMove
      }
      // if illegal, just deselect (clearHighlights already called)
      return;
    }

    // ── Case 2: nothing selected yet ──
    if (!clickedPiece || clickedPiece.color !== activeColor()) return;
    selectSquare(square);
  }

  // ── Board init ───────────────────────────────────────────────
  var board = Chessboard('board', {
    draggable:     true,
    position:      'start',
    orientation:   MODE === 'bot' ? MY_COLOR : 'white',
    pieceTheme:    pieceTheme,
    onDragStart:   onDragStart,
    onDrop:        onDrop,
    onSnapEnd:     onSnapEnd,
    onSquareClick: onSquareClick,
  });

  function resizeBoard() {
    var wrapper = document.querySelector('.board-wrapper');
    var sz = Math.min(wrapper.clientWidth, 560);
    board.resize(sz);
  }
  resizeBoard();
  window.addEventListener('resize', resizeBoard);

  // ── Bot API ──────────────────────────────────────────────────
  function fetchBotMove(fen) {
    fetch('/api/move', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fen: fen, bot_id: BOT_ID, prev_fen: prevFen }),
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      botThinking = false;
      if (data.error) { setStatus('Engine error: ' + data.error); return; }
      var uci  = data.move;
      var move = chess.move({
        from:      uci.slice(0, 2),
        to:        uci.slice(2, 4),
        promotion: uci.length === 5 ? uci[4] : 'q',
      });
      if (move) {
        board.position(chess.fen());
        appendMove(move.san);
        checkGameOver();
        if (!chess.game_over()) setStatus('Your turn');
      }
      if (data.dialogue) addChat(data.dialogue);
    })
    .catch(function() {
      botThinking = false;
      setStatus('Connection error — try again');
    });
  }

  // ── UI helpers ───────────────────────────────────────────────
  function appendMove(san) {
    var li = document.createElement('li');
    li.textContent = san;
    moveList.appendChild(li);
    moveList.scrollTop = moveList.scrollHeight;
  }

  function addChat(text) {
    var strip = document.getElementById('chat-strip');
    var msg   = document.createElement('div');
    msg.className   = 'chat-msg';
    msg.textContent = text;
    strip.appendChild(msg);
    strip.scrollTop = strip.scrollHeight;
  }

  function setStatus(msg) {
    document.getElementById('board-status').textContent = msg;
  }

  function checkGameOver() {
    if (!chess.game_over()) return;
    var title, body, result;
    if (chess.in_checkmate()) {
      var winner = chess.turn() === 'w' ? 'Black' : 'White';
      title  = 'Checkmate — ' + winner + ' wins!';
      body   = 'The king has fallen.';
      result = chess.turn() === 'w' ? '0-1' : '1-0';
    } else if (chess.in_draw()) {
      title  = 'Draw';
      body   = chess.in_stalemate()          ? 'Stalemate.'
             : chess.insufficient_material() ? 'Insufficient material.'
             :                                 'Draw by repetition.';
      result = '1/2-1/2';
    }
    if (title) showModal(title, body, result);
  }

  function showModal(title, body, result) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-body').textContent  = body;
    document.getElementById('modal').style.display     = 'flex';
    document.getElementById('modal-save').onclick = function() { saveGame(result); };
  }

  function saveGame(result) {
    fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        pgn: chess.pgn(), result: result,
        mode: MODE, bot_name: BOT_ID, player_color: MY_COLOR,
      }),
    })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.game_id) {
        document.getElementById('modal-save').textContent = 'Saved';
        document.getElementById('modal-save').disabled    = true;
      }
    });
  }

  document.getElementById('btn-resign').onclick = function() {
    if (chess.game_over()) return;
    showModal('You resigned.', 'Better luck next time.',
              MY_COLOR === 'white' ? '0-1' : '1-0');
  };
  document.getElementById('btn-new').onclick = function() {
    window.location.reload();
  };

  // ── Start ────────────────────────────────────────────────────
  if (MODE === 'bot' && BOT_ID) {
    fetch('/api/bots')
      .then(function(r) { return r.json(); })
      .then(function(bots) {
        var bot = bots.find(function(b) { return b.id === BOT_ID; });
        if (bot) {
          document.getElementById('bot-avatar').textContent = bot.name.charAt(0);
          document.getElementById('bot-name').textContent   = bot.name;
        }
      });
    if (MY_COLOR === 'black') {
      botThinking = true;
      setStatus('Bot is thinking...');
      setTimeout(function() { fetchBotMove(chess.fen()); }, 500);
    } else {
      setStatus('Your turn');
    }
  } else {
    setStatus("White's turn");
  }
</script>
{% endblock %}
