{% extends 'base.html' %}
{% block title %}Play — My Chess{% endblock %}

{% block head %}
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css" />
{% endblock %}

{% block content %}
<div class="play-page">

  <div class="game-sidebar left-sidebar">
    <div class="player-info bot-info" id="bot-info" style="{{ 'display:none' if mode == 'pass_and_play' }}">
      <div class="bot-initial-lg" id="bot-avatar">?</div>
      <div class="player-name" id="bot-name">{{ bot or 'Bot' }}</div>
    </div>

    <div class="chat-box" id="chat-box" style="{{ 'display:none' if mode == 'pass_and_play' }}">
      <div class="chat-messages" id="chat-messages"></div>
    </div>
  </div>

  <div class="board-wrapper">
    <div id="board"></div>
    <div class="board-status" id="board-status">Waiting for move...</div>
  </div>

  <div class="game-sidebar right-sidebar">
    <div class="move-history" id="move-history">
      <h3>Moves</h3>
      <ol id="move-list"></ol>
    </div>

    <div class="game-controls">
      <button id="btn-resign" class="btn-outline btn-danger">Resign</button>
      <button id="btn-new" class="btn-outline">New Game</button>
    </div>
  </div>

</div>

<!-- Game over modal -->
<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal-box">
    <h2 id="modal-title">Game Over</h2>
    <p id="modal-body"></p>
    <div class="modal-actions">
      <button id="modal-save" class="btn-primary">Save Game</button>
      <a href="{{ url_for('game.dashboard') }}" class="btn-outline">Dashboard</a>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

<style>
  .highlight-selected { background: rgba(201, 168, 76, 0.6) !important; }
  .highlight-move      { background: rgba(201, 168, 76, 0.3) !important; }
  .highlight-move .square-55d63 { position: relative; }
  .square-55d63 { position: relative; }
  .dot-hint {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 32%; height: 32%;
    background: rgba(201, 168, 76, 0.75);
    border-radius: 50%;
    pointer-events: none;
    z-index: 10;
  }
</style>

<script>
  const MODE      = "{{ mode }}";
  const BOT_ID    = "{{ bot or '' }}";
  const MY_COLOR  = "{{ color }}";
  let prevFen     = null;
  let currentTurn = 'white';
  const chess     = new Chess();
  const moveList  = document.getElementById('move-list');

  // Click-to-move state
  let selectedSquare = null;

  // Wikimedia SVG pieces — no server dependency
  const WIKI = {
    wK: '4/42/Chess_klt45.svg', wQ: '1/15/Chess_qlt45.svg',
    wR: '7/72/Chess_rlt45.svg', wB: 'b/b1/Chess_blt45.svg',
    wN: '7/70/Chess_nlt45.svg', wP: '4/45/Chess_plt45.svg',
    bK: 'f/f0/Chess_kdt45.svg', bQ: '4/47/Chess_qdt45.svg',
    bR: 'f/ff/Chess_rdt45.svg', bB: '9/98/Chess_bdt45.svg',
    bN: 'e/ef/Chess_ndt45.svg', bP: 'c/c7/Chess_pdt45.svg',
  };
  function pieceTheme(p) {
    return 'https://upload.wikimedia.org/wikipedia/commons/' + WIKI[p];
  }

  // ── Highlight helpers ──────────────────────────────────────────
  function clearHighlights() {
    $('#board .square-55d63').removeClass('highlight-selected highlight-move');
    $('#board .dot-hint').remove();
    selectedSquare = null;
  }

  function highlightSelected(sq) {
    $('#board .square-' + sq).addClass('highlight-selected');
  }

  function highlightMoves(moves) {
    moves.forEach(m => {
      const $sq = $('#board .square-' + m.to);
      $sq.addClass('highlight-move');
      $sq.append('<div class="dot-hint"></div>');
    });
  }

  // ── Is it my turn? ─────────────────────────────────────────────
  function isMyTurn() {
    if (chess.game_over()) return false;
    if (MODE === 'bot') return chess.turn() === MY_COLOR[0];
    return chess.turn() === currentTurn[0];
  }

  function myColorChar() {
    return MODE === 'bot' ? MY_COLOR[0] : currentTurn[0];
  }

  // ── Execute a move and handle aftermath ────────────────────────
  function executeMove(from, to) {
    prevFen = chess.fen();
    const move = chess.move({ from, to, promotion: 'q' });
    if (!move) return false;

    board.position(chess.fen());
    appendMove(move.san, chess.turn() === 'w' ? 'black' : 'white');
    checkGameOver();

    if (MODE === 'bot' && !chess.game_over()) {
      setStatus('Bot is thinking...');
      setTimeout(() => fetchBotMove(chess.fen()), 300);
    } else if (MODE === 'pass_and_play') {
      currentTurn = currentTurn === 'white' ? 'black' : 'white';
      setStatus(capitalize(currentTurn) + "'s turn");
    }
    return true;
  }

  // ── Square click handler ───────────────────────────────────────
  function onSquareClick(square) {
    if (!isMyTurn()) return;

    if (selectedSquare) {
      if (square === selectedSquare) {
        clearHighlights();
        return;
      }
      // Attempt move
      const ok = executeMove(selectedSquare, square);
      clearHighlights();
      if (!ok) {
        // Maybe they clicked another own piece — re-select
        const p = chess.get(square);
        if (p && p.color === myColorChar()) {
          selectSquare(square);
        }
      }
      return;
    }

    const p = chess.get(square);
    if (!p || p.color !== myColorChar()) return;
    selectSquare(square);
  }

  function selectSquare(square) {
    clearHighlights();
    const moves = chess.moves({ square, verbose: true });
    if (!moves.length) return;
    selectedSquare = square;
    highlightSelected(square);
    highlightMoves(moves);
  }

  // ── chessboard.js ──────────────────────────────────────────────
  const board = Chessboard('board', {
    draggable: true,
    position: 'start',
    orientation: MODE === 'bot' ? MY_COLOR : 'white',
    pieceTheme: pieceTheme,
    onDragStart: function(source, piece) {
      if (!isMyTurn()) return false;
      if (piece[0] !== myColorChar()) return false;
      clearHighlights();
    },
    onDrop: function(source, target) {
      const ok = executeMove(source, target);
      if (!ok) return 'snapback';
    },
    onSnapEnd: function() { board.position(chess.fen()); },
    onSquareClick: onSquareClick,
  });

  // ── Bot move ───────────────────────────────────────────────────
  function fetchBotMove(fen) {
    fetch('/api/move', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fen, bot_id: BOT_ID, prev_fen: prevFen }),
    })
    .then(r => r.json())
    .then(data => {
      if (data.error) { setStatus('Engine error: ' + data.error); return; }
      const move = chess.move({ from: data.move.slice(0,2), to: data.move.slice(2,4), promotion: 'q' });
      if (move) {
        board.position(chess.fen());
        appendMove(move.san, chess.turn() === 'w' ? 'black' : 'white');
        checkGameOver();
        setStatus('Your turn');
      }
      if (data.dialogue) addChat(data.dialogue);
    })
    .catch(() => setStatus('Connection error'));
  }

  // ── Utilities ──────────────────────────────────────────────────
  function appendMove(san, color) {
    const li = document.createElement('li');
    li.textContent = san;
    li.className = color;
    moveList.appendChild(li);
    moveList.scrollTop = moveList.scrollHeight;
  }

  function addChat(text) {
    const box = document.getElementById('chat-messages');
    const msg = document.createElement('div');
    msg.className = 'chat-msg';
    msg.textContent = text;
    box.appendChild(msg);
    box.scrollTop = box.scrollHeight;
  }

  function setStatus(msg) { document.getElementById('board-status').textContent = msg; }
  function capitalize(s)  { return s.charAt(0).toUpperCase() + s.slice(1); }

  function checkGameOver() {
    if (!chess.game_over()) return;
    let title, body, result;
    if (chess.in_checkmate()) {
      const winner = chess.turn() === 'w' ? 'Black' : 'White';
      title = 'Checkmate — ' + winner + ' wins!';
      body  = 'The king has fallen.';
      result = chess.turn() === 'w' ? '0-1' : '1-0';
    } else if (chess.in_draw()) {
      title = 'Draw';
      body  = chess.in_stalemate()          ? 'Stalemate.'            :
              chess.insufficient_material() ? 'Insufficient material.' : 'Draw by repetition.';
      result = '1/2-1/2';
    }
    if (title) showModal(title, body, result);
  }

  function showModal(title, body, result) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-body').textContent  = body;
    document.getElementById('modal').style.display = 'flex';
    document.getElementById('modal-save').onclick = () => saveGame(result);
  }

  function saveGame(result) {
    fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pgn: chess.pgn(), result, mode: MODE, bot_name: BOT_ID, player_color: MY_COLOR }),
    }).then(r => r.json()).then(d => {
      if (d.game_id) {
        document.getElementById('modal-save').textContent = 'Saved';
        document.getElementById('modal-save').disabled = true;
      }
    });
  }

  document.getElementById('btn-resign').onclick = () => {
    showModal('You resigned.', 'Better luck next time.', MY_COLOR === 'white' ? '0-1' : '1-0');
  };
  document.getElementById('btn-new').onclick = () => window.location.reload();

  // ── Init ───────────────────────────────────────────────────────
  if (MODE === 'bot' && BOT_ID) {
    fetch('/api/bots').then(r => r.json()).then(bots => {
      const bot = bots.find(b => b.id === BOT_ID);
      if (bot) {
        document.getElementById('bot-avatar').textContent = bot.name.charAt(0);
        document.getElementById('bot-name').textContent   = bot.name;
      }
    });
    if (MY_COLOR === 'black') {
      setStatus('Bot is thinking...');
      setTimeout(() => fetchBotMove(chess.fen()), 500);
    } else {
      setStatus('Your turn');
    }
  } else {
    setStatus("White's turn");
  }
</script>
{% endblock %}
