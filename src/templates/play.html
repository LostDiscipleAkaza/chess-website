{% extends 'base.html' %}
{% block title %}Play — My Chess{% endblock %}

{% block head %}
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css" />
<style>
  /* ── Responsive play layout ── */
  .play-page {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    max-width: 600px;
    margin: 0 auto;
    padding: 0.5rem 0.75rem 2rem;
  }

  .board-wrapper {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
  }

  #board { width: 100% !important; }

  .board-status {
    color: var(--muted);
    font-size: .9rem;
    text-align: center;
    min-height: 1.4em;
  }

  /* Bot info bar */
  .bot-info-bar {
    width: 100%;
    max-width: 560px;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.65rem 1rem;
  }
  .bot-initial-sm {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-head);
    font-size: 1rem;
    color: var(--accent);
    font-weight: 700;
    flex-shrink: 0;
  }
  .bot-name {
    font-family: var(--font-head);
    font-size: 1rem;
    flex: 1;
  }

  /* Chat strip */
  .chat-strip {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    max-height: 110px;
    overflow-y: auto;
  }
  .chat-msg {
    font-size: .85rem;
    color: var(--text);
    background: var(--surface2);
    border-radius: 8px;
    padding: .45rem .75rem;
    line-height: 1.4;
    animation: fadeIn .3s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(3px); } to { opacity:1; transform:none; } }

  /* Move list */
  .move-history {
    width: 100%;
    max-width: 560px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 1rem;
  }
  .move-history h3 {
    font-size: .75rem;
    text-transform: uppercase;
    color: var(--muted);
    letter-spacing: .06em;
    margin-bottom: .5rem;
  }
  #move-list {
    list-style: decimal;
    padding-left: 1.2rem;
    font-size: .9rem;
    max-height: 110px;
    overflow-y: auto;
    columns: 2;
    gap: 1rem;
  }
  #move-list li { padding: .1rem 0; break-inside: avoid; }
  #move-list li.active { color: var(--accent); }

  /* Controls */
  .game-controls {
    width: 100%;
    max-width: 560px;
    display: flex;
    gap: 0.75rem;
  }
  .game-controls button { flex: 1; }

  /* Square highlights */
  .square-55d63 { position: relative; }
  .highlight-selected { background: rgba(201,168,76,.65) !important; }
  .highlight-move     { background: rgba(201,168,76,.30) !important; }
  .dot-hint {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 30%; height: 30%;
    background: rgba(201,168,76,.80);
    border-radius: 50%;
    pointer-events: none;
    z-index: 5;
  }

  /* Desktop side-by-side */
  @media (min-width: 900px) {
    .play-page {
      display: grid;
      grid-template-columns: 200px 1fr 200px;
      max-width: 1060px;
      align-items: start;
      gap: 1.5rem;
      padding: 1rem 2rem 2rem;
    }
    .board-wrapper  { grid-column: 2; grid-row: 1 / 10; max-width: 560px; }
    .bot-info-bar   { grid-column: 1; grid-row: 1; max-width: none; }
    .chat-strip     { grid-column: 1; grid-row: 2; max-height: 260px; max-width: none; }
    .move-history   { grid-column: 3; grid-row: 1; max-width: none; }
    #move-list      { max-height: 340px; columns: 1; }
    .game-controls  { grid-column: 3; grid-row: 2; max-width: none; flex-direction: column; }
  }

  /* ── Promotion modal ── */
  .promo-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.75);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2000;
  }
  .promo-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.5rem 2rem;
    text-align: center;
    min-width: 260px;
  }
  .promo-box h3 {
    font-family: var(--font-head);
    font-size: 1.1rem;
    color: var(--accent);
    margin-bottom: 1rem;
  }
  .promo-pieces {
    display: flex;
    gap: 0.75rem;
    justify-content: center;
  }
  .promo-piece {
    width: 60px; height: 60px;
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color .15s, background .15s;
    padding: 4px;
  }
  .promo-piece:hover {
    border-color: var(--accent);
    background: var(--surface);
  }
  .promo-piece img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .promo-piece span {
    font-size: .65rem;
    color: var(--muted);
    display: block;
    margin-top: 2px;
  }
  .promo-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .promo-label {
    font-size: .7rem;
    color: var(--muted);
  }
</style>
{% endblock %}

{% block content %}
<div class="play-page">

  <div class="bot-info-bar" id="bot-info-bar"
       style="{{ 'display:none' if mode == 'pass_and_play' }}">
    <div class="bot-initial-sm" id="bot-avatar">?</div>
    <div class="bot-name" id="bot-name">{{ bot or 'Bot' }}</div>
  </div>

  <div class="chat-strip" id="chat-strip"
       style="{{ 'display:none' if mode == 'pass_and_play' }}"></div>

  <div class="board-wrapper">
    <div id="board"></div>
    <div class="board-status" id="board-status">Waiting...</div>
  </div>

  <div class="move-history">
    <h3>Moves</h3>
    <ol id="move-list"></ol>
  </div>

  <div class="game-controls">
    <button id="btn-resign" class="btn-outline btn-danger">Resign</button>
    <button id="btn-new"    class="btn-outline">New Game</button>
  </div>

</div>

<!-- Game-over modal -->
<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal-box">
    <h2 id="modal-title">Game Over</h2>
    <p  id="modal-body"></p>
    <div class="modal-actions">
      <button id="modal-save" class="btn-primary">Save Game</button>
      <a href="{{ url_for('game.dashboard') }}" class="btn-outline">Dashboard</a>
    </div>
  </div>
</div>

<!-- Promotion picker modal -->
<div class="promo-overlay" id="promo-modal" style="display:none">
  <div class="promo-box">
    <h3>Promote Pawn</h3>
    <div class="promo-pieces" id="promo-pieces"></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
<script>
  const MODE      = "{{ mode }}";
  const BOT_ID    = "{{ bot or '' }}";
  const MY_COLOR  = "{{ color }}";
  let prevFen     = null;
  let currentTurn = 'white';   // used in pass-and-play only
  const chess     = new Chess();
  const moveList  = document.getElementById('move-list');

  // ── State flags ───────────────────────────────────────────────
  let selectedSquare = null;   // square currently selected for click-move
  let dragInProgress = false;  // true while a drag is active
  let botThinking    = false;  // true while waiting for bot API response

  // ── Wikimedia SVG pieces ──────────────────────────────────────
  const WIKI = {
    wK:'4/42/Chess_klt45.svg', wQ:'1/15/Chess_qlt45.svg',
    wR:'7/72/Chess_rlt45.svg', wB:'b/b1/Chess_blt45.svg',
    wN:'7/70/Chess_nlt45.svg', wP:'4/45/Chess_plt45.svg',
    bK:'f/f0/Chess_kdt45.svg', bQ:'4/47/Chess_qdt45.svg',
    bR:'f/ff/Chess_rdt45.svg', bB:'9/98/Chess_bdt45.svg',
    bN:'e/ef/Chess_ndt45.svg', bP:'c/c7/Chess_pdt45.svg',
  };
  function pieceTheme(p) {
    return 'https://upload.wikimedia.org/wikipedia/commons/' + WIKI[p];
  }

  // ── Promotion helpers ─────────────────────────────────────────
  // Returns true if the move from->to is a pawn promotion
  function isPromotion(from, to) {
    var piece = chess.get(from);
    if (!piece || piece.type !== 'p') return false;
    var toRank = to[1];
    return (piece.color === 'w' && toRank === '8') ||
           (piece.color === 'b' && toRank === '1');
  }

  // Show the promotion picker, resolve with chosen piece letter ('q','r','b','n')
  function askPromotion(color) {
    return new Promise(function(resolve) {
      var pieces = [
        { code: 'q', label: 'Queen'  },
        { code: 'r', label: 'Rook'   },
        { code: 'b', label: 'Bishop' },
        { code: 'n', label: 'Knight' },
      ];
      var c = color === 'w' ? 'w' : 'b';
      var container = document.getElementById('promo-pieces');
      container.innerHTML = pieces.map(function(p) {
        var pieceKey = c + p.code.toUpperCase();
        var imgUrl   = pieceTheme(pieceKey);
        return '<div class="promo-item">' +
                 '<div class="promo-piece" data-piece="' + p.code + '">' +
                   '<img src="' + imgUrl + '" alt="' + p.label + '" />' +
                 '</div>' +
                 '<span class="promo-label">' + p.label + '</span>' +
               '</div>';
      }).join('');

      document.getElementById('promo-modal').style.display = 'flex';

      container.querySelectorAll('.promo-piece').forEach(function(el) {
        el.addEventListener('click', function() {
          document.getElementById('promo-modal').style.display = 'none';
          resolve(el.getAttribute('data-piece'));
        }, { once: true });
      });
    });
  }

  // ── Highlights ────────────────────────────────────────────────
  function clearHighlights() {
    $('#board .square-55d63').removeClass('highlight-selected highlight-move');
    $('#board .dot-hint').remove();
    selectedSquare = null;
  }

  function doSelectSquare(square) {
    clearHighlights();
    var moves = chess.moves({ square: square, verbose: true });
    if (!moves.length) return;
    selectedSquare = square;
    $('#board .square-' + square).addClass('highlight-selected');
    moves.forEach(function(m) {
      $('#board .square-' + m.to)
        .addClass('highlight-move')
        .append('<div class="dot-hint"></div>');
    });
  }

  // ── Turn helpers ──────────────────────────────────────────────
  function activeColorChar() {
    // Which color is allowed to move right now
    if (MODE === 'bot') return MY_COLOR[0];
    return currentTurn[0];   // pass-and-play
  }

  function isMyTurn() {
    if (chess.game_over()) return false;
    if (botThinking)       return false;
    return chess.turn() === activeColorChar();
  }

  // ── Execute a move (async — handles promotion picker) ─────────
  function executeMove(from, to, promotionPiece) {
    // promotionPiece is undefined on first call;
    // we'll re-enter after the picker resolves.
    if (promotionPiece === undefined && isPromotion(from, to)) {
      var movingColor = chess.get(from).color;
      askPromotion(movingColor).then(function(piece) {
        executeMove(from, to, piece);
      });
      return true;   // move started (picker pending)
    }

    prevFen = chess.fen();
    var moveObj = chess.move({
      from: from,
      to: to,
      promotion: promotionPiece || 'q',
    });
    if (!moveObj) return false;

    board.position(chess.fen());
    var justMoved = moveObj.color === 'w' ? 'white' : 'black';
    appendMove(moveObj.san, justMoved);
    checkGameOver();

    if (!chess.game_over()) {
      if (MODE === 'bot') {
        botThinking = true;
        setStatus('Bot is thinking...');
        setTimeout(function() { fetchBotMove(chess.fen()); }, 300);
      } else {
        // pass-and-play: flip turn
        currentTurn = currentTurn === 'white' ? 'black' : 'white';
        setStatus(capitalize(currentTurn) + "'s turn");
      }
    }
    return true;
  }

  // ── chessboard.js callbacks ───────────────────────────────────

  function onDragStart(source, piece) {
    if (!isMyTurn())                        return false;
    if (piece[0] !== activeColorChar())     return false;
    clearHighlights();
    dragInProgress = true;
    return true;
  }

  function onDrop(source, target) {
    if (source === target) {
      dragInProgress = false;
      return 'snapback';
    }

    // Promotion via drag: show picker, then apply
    if (isPromotion(source, target)) {
      var movingColor = chess.get(source).color;
      // Snapback the piece visually while we wait for picker
      askPromotion(movingColor).then(function(piece) {
        var ok = executeMove(source, target, piece);
        if (!ok) board.position(chess.fen());
      });
      dragInProgress = false;
      return 'snapback';   // piece snaps back; we'll reposition after pick
    }

    var ok = executeMove(source, target, undefined);
    if (!ok) {
      dragInProgress = false;
      return 'snapback';
    }
    // dragInProgress cleared in onSnapEnd
  }

  function onSnapEnd() {
    board.position(chess.fen());
    setTimeout(function() { dragInProgress = false; }, 50);
  }

  function onSquareClick(square) {
    if (dragInProgress) return;   // tail of a drag event, ignore
    if (!isMyTurn())    return;

    // Something already selected — try to move
    if (selectedSquare) {
      if (square === selectedSquare) {
        clearHighlights();
        return;
      }

      var targetPiece = chess.get(square);
      // If they clicked their own piece, re-select it instead of trying a move
      if (targetPiece && targetPiece.color === activeColorChar()) {
        doSelectSquare(square);
        return;
      }

      // Validate the move exists before committing
      var legalMoves = chess.moves({ square: selectedSquare, verbose: true });
      var isLegal    = legalMoves.some(function(m) { return m.to === square; });

      if (isLegal) {
        var from = selectedSquare;
        clearHighlights();
        executeMove(from, square);   // promotion picker handled inside
      } else {
        clearHighlights();
      }
      return;
    }

    // Nothing selected — select this square if it belongs to the active player
    var piece = chess.get(square);
    if (!piece || piece.color !== activeColorChar()) return;
    doSelectSquare(square);
  }

  // ── Board init ────────────────────────────────────────────────
  var board = Chessboard('board', {
    draggable:     true,
    position:      'start',
    orientation:   MODE === 'bot' ? MY_COLOR : 'white',
    pieceTheme:    pieceTheme,
    onDragStart:   onDragStart,
    onDrop:        onDrop,
    onSnapEnd:     onSnapEnd,
    onSquareClick: onSquareClick,
  });

  function resizeBoard() {
    var wrapper = document.querySelector('.board-wrapper');
    var sz = Math.min(wrapper.clientWidth, 560);
    board.resize(sz);
  }
  resizeBoard();
  window.addEventListener('resize', resizeBoard);

  // ── Bot move fetch ────────────────────────────────────────────
  function fetchBotMove(fen) {
    fetch('/api/move', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fen: fen, bot_id: BOT_ID, prev_fen: prevFen }),
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      botThinking = false;
      if (data.error) { setStatus('Engine error: ' + data.error); return; }
      var move = chess.move({
        from:      data.move.slice(0, 2),
        to:        data.move.slice(2, 4),
        promotion: data.move.length === 5 ? data.move[4] : 'q',
      });
      if (move) {
        board.position(chess.fen());
        appendMove(move.san, move.color === 'w' ? 'white' : 'black');
        checkGameOver();
        if (!chess.game_over()) setStatus('Your turn');
      }
      if (data.dialogue) addChat(data.dialogue);
    })
    .catch(function() {
      botThinking = false;
      setStatus('Connection error — try again');
    });
  }

  // ── Helpers ───────────────────────────────────────────────────
  function appendMove(san, color) {
    var li = document.createElement('li');
    li.textContent = san;
    li.className   = color;
    moveList.appendChild(li);
    moveList.scrollTop = moveList.scrollHeight;
  }

  function addChat(text) {
    var strip = document.getElementById('chat-strip');
    var msg   = document.createElement('div');
    msg.className   = 'chat-msg';
    msg.textContent = text;
    strip.appendChild(msg);
    strip.scrollTop = strip.scrollHeight;
  }

  function setStatus(msg) {
    document.getElementById('board-status').textContent = msg;
  }

  function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

  function checkGameOver() {
    if (!chess.game_over()) return;
    var title, body, result;
    if (chess.in_checkmate()) {
      var winner = chess.turn() === 'w' ? 'Black' : 'White';
      title  = 'Checkmate — ' + winner + ' wins!';
      body   = 'The king has fallen.';
      result = chess.turn() === 'w' ? '0-1' : '1-0';
    } else if (chess.in_draw()) {
      title  = 'Draw';
      body   = chess.in_stalemate()          ? 'Stalemate.'
             : chess.insufficient_material() ? 'Insufficient material.'
             :                                 'Draw by repetition.';
      result = '1/2-1/2';
    }
    if (title) showModal(title, body, result);
  }

  function showModal(title, body, result) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-body').textContent  = body;
    document.getElementById('modal').style.display     = 'flex';
    document.getElementById('modal-save').onclick = function() { saveGame(result); };
  }

  function saveGame(result) {
    fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        pgn: chess.pgn(), result: result,
        mode: MODE, bot_name: BOT_ID, player_color: MY_COLOR,
      }),
    })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.game_id) {
        document.getElementById('modal-save').textContent = 'Saved';
        document.getElementById('modal-save').disabled    = true;
      }
    });
  }

  document.getElementById('btn-resign').onclick = function() {
    if (chess.game_over()) return;
    showModal('You resigned.', 'Better luck next time.',
              MY_COLOR === 'white' ? '0-1' : '1-0');
  };
  document.getElementById('btn-new').onclick = function() {
    window.location.reload();
  };

  // ── Start ─────────────────────────────────────────────────────
  if (MODE === 'bot' && BOT_ID) {
    fetch('/api/bots')
      .then(function(r) { return r.json(); })
      .then(function(bots) {
        var bot = bots.find(function(b) { return b.id === BOT_ID; });
        if (bot) {
          document.getElementById('bot-avatar').textContent = bot.name.charAt(0);
          document.getElementById('bot-name').textContent   = bot.name;
        }
      });
    if (MY_COLOR === 'black') {
      botThinking = true;
      setStatus('Bot is thinking...');
      setTimeout(function() { fetchBotMove(chess.fen()); }, 500);
    } else {
      setStatus('Your turn');
    }
  } else {
    setStatus("White's turn");
  }
</script>
{% endblock %}
