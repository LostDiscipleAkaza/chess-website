{% extends 'base.html' %}
{% block title %}Play — ChessBot{% endblock %}

{% block head %}
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css" />
{% endblock %}

{% block content %}
<div class="play-page">

  <div class="game-sidebar left-sidebar">
    <div class="player-info bot-info" id="bot-info" style="{{ 'display:none' if mode == 'pass_and_play' }}">
      <div class="player-avatar" id="bot-avatar">🤖</div>
      <div class="player-name" id="bot-name">{{ bot or 'Bot' }}</div>
    </div>

    <div class="chat-box" id="chat-box" style="{{ 'display:none' if mode == 'pass_and_play' }}">
      <div class="chat-messages" id="chat-messages"></div>
    </div>
  </div>

  <div class="board-wrapper">
    <div id="board"></div>
    <div class="board-status" id="board-status">Waiting for move...</div>
  </div>

  <div class="game-sidebar right-sidebar">
    <div class="captured-pieces" id="captured-top"></div>

    <div class="move-history" id="move-history">
      <h3>Moves</h3>
      <ol id="move-list"></ol>
    </div>

    <div class="captured-pieces" id="captured-bottom"></div>

    <div class="game-controls">
      <button id="btn-resign" class="btn-outline btn-danger">Resign</button>
      <button id="btn-new" class="btn-outline">New Game</button>
    </div>
  </div>

</div>

<!-- Game over modal -->
<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal-box">
    <h2 id="modal-title">Game Over</h2>
    <p id="modal-body"></p>
    <div class="modal-actions">
      <button id="modal-save" class="btn-primary">Save Game</button>
      <a href="{{ url_for('game.dashboard') }}" class="btn-outline">Dashboard</a>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
<script>
  const MODE       = "{{ mode }}";
  const BOT_ID     = "{{ bot or '' }}";
  const MY_COLOR   = "{{ color }}";   // 'white' or 'black' (vs bot)
  let prevFen      = null;
  let currentTurn  = 'white';         // pass-and-play tracking
  const chess      = new Chess();
  const moveList   = document.getElementById('move-list');

  // ── chessboard.js config ──────────────────────────────────────
  const board = Chessboard('board', {
    draggable: true,
    position: 'start',
    orientation: MODE === 'bot' ? MY_COLOR : 'white',
    onDragStart,
    onDrop,
    onSnapEnd: () => board.position(chess.fen()),
  });

  // ── drag guard ────────────────────────────────────────────────
  function onDragStart(source, piece) {
    if (chess.game_over()) return false;
    if (MODE === 'bot') {
      // Only allow player's color
      if ((MY_COLOR === 'white' && piece.startsWith('b')) ||
          (MY_COLOR === 'black' && piece.startsWith('w'))) return false;
      if (chess.turn() !== MY_COLOR[0]) return false;  // bot's turn
    } else {
      // Pass & play: enforce turns
      if ((currentTurn === 'white' && piece.startsWith('b')) ||
          (currentTurn === 'black' && piece.startsWith('w'))) return false;
    }
  }

  // ── drop handler ──────────────────────────────────────────────
  function onDrop(source, target) {
    prevFen = chess.fen();
    const move = chess.move({ from: source, to: target, promotion: 'q' });
    if (!move) return 'snapback';

    appendMove(move.san, chess.turn() === 'w' ? 'black' : 'white');
    checkGameOver();

    if (MODE === 'bot' && !chess.game_over()) {
      setStatus("Bot is thinking...");
      fetchBotMove(chess.fen());
    } else if (MODE === 'pass_and_play') {
      currentTurn = currentTurn === 'white' ? 'black' : 'white';
      setStatus(`${capitalize(currentTurn)}'s turn`);
    }
  }

  // ── bot move fetch ────────────────────────────────────────────
  function fetchBotMove(fen) {
    fetch('/api/move', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fen, bot_id: BOT_ID, prev_fen: prevFen }),
    })
    .then(r => r.json())
    .then(data => {
      if (data.error) { setStatus('Engine error: ' + data.error); return; }

      const move = chess.move({ from: data.move.slice(0,2), to: data.move.slice(2,4), promotion: 'q' });
      if (move) {
        board.position(chess.fen());
        appendMove(move.san, chess.turn() === 'w' ? 'black' : 'white');
        checkGameOver();
        setStatus("Your turn");
      }

      if (data.dialogue) addChat(data.dialogue);
    })
    .catch(() => setStatus('Connection error'));
  }

  // ── helpers ───────────────────────────────────────────────────
  function appendMove(san, color) {
    const li = document.createElement('li');
    li.textContent = san;
    li.className = color;
    moveList.appendChild(li);
    moveList.scrollTop = moveList.scrollHeight;
  }

  function addChat(text) {
    const box = document.getElementById('chat-messages');
    const msg = document.createElement('div');
    msg.className = 'chat-msg';
    msg.textContent = text;
    box.appendChild(msg);
    box.scrollTop = box.scrollHeight;
  }

  function setStatus(msg) {
    document.getElementById('board-status').textContent = msg;
  }

  function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

  function checkGameOver() {
    if (!chess.game_over()) return;
    let title, body, result;
    if (chess.in_checkmate()) {
      const winner = chess.turn() === 'w' ? 'Black' : 'White';
      title = `Checkmate — ${winner} wins!`;
      body  = 'The king has fallen.';
      result = chess.turn() === 'w' ? '0-1' : '1-0';
    } else if (chess.in_draw()) {
      title = 'Draw';
      body  = chess.in_stalemate() ? 'Stalemate.' :
              chess.insufficient_material() ? 'Insufficient material.' : 'Draw by repetition.';
      result = '1/2-1/2';
    }
    showModal(title, body, result);
  }

  function showModal(title, body, result) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-body').textContent  = body;
    document.getElementById('modal').style.display = 'flex';

    document.getElementById('modal-save').onclick = () => saveGame(result);
  }

  function saveGame(result) {
    const pgn = chess.pgn();
    fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        pgn, result, mode: MODE, bot_name: BOT_ID, player_color: MY_COLOR
      }),
    }).then(r => r.json()).then(d => {
      if (d.game_id) {
        document.getElementById('modal-save').textContent = 'Saved ✓';
        document.getElementById('modal-save').disabled = true;
      }
    });
  }

  // ── controls ──────────────────────────────────────────────────
  document.getElementById('btn-resign').onclick = () => {
    const result = MY_COLOR === 'white' ? '0-1' : '1-0';
    showModal('You resigned.', 'Better luck next time.', result);
  };

  document.getElementById('btn-new').onclick = () => window.location.reload();

  // ── load bot manifest for name/avatar ─────────────────────────
  if (MODE === 'bot' && BOT_ID) {
    fetch('/api/bots').then(r => r.json()).then(bots => {
      const bot = bots.find(b => b.id === BOT_ID);
      if (bot) {
        document.getElementById('bot-avatar').textContent = bot.avatar;
        document.getElementById('bot-name').textContent   = bot.name;
      }
    });
    setStatus("Your turn");
    // If player is black, bot moves first
    if (MY_COLOR === 'black') {
      setStatus("Bot is thinking...");
      fetchBotMove(chess.fen());
    }
  } else {
    setStatus("White's turn");
  }
</script>
{% endblock %}
